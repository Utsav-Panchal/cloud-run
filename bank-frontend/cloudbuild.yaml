steps:
  # 0. Fetch the backend Cloud Run URL dynamically
  - name: 'gcr.io/cloud-builders/gcloud'
    id: 'get-backend-url'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        BACKEND_URL=$(gcloud run services describe utsav-bank-backend --region us-central1 --format='value(status.url)')
        echo "Found backend URL: $$BACKEND_URL"
        echo "$$BACKEND_URL" > /workspace/backend_url.txt

  # 1. Build the frontend container image (injecting the build argument)
  - name: 'gcr.io/cloud-builders/docker'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        BACKEND_URL=$(cat /workspace/backend_url.txt)
        docker build \
          --build-arg REACT_APP_API_URL=$$_BACKEND_URL \
          -t us-central1-docker.pkg.dev/$PROJECT_ID/utsav-repo/utsav-bank-frontend:$COMMIT_SHA \
          ./bank-frontend

  # 2. Push frontend image to Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/utsav-repo/utsav-bank-frontend:$COMMIT_SHA'

  # 3. Deploy frontend to Cloud Run
  - name: 'gcr.io/cloud-builders/gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'utsav-bank-frontend'
      - '--image'
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/utsav-repo/utsav-bank-frontend:$COMMIT_SHA'
      - '--region'
      - 'us-central1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'

options:
  logging: CLOUD_LOGGING_ONLY